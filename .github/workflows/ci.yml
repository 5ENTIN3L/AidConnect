name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

env:
  NODE_VERSION: '18.x'

jobs:
  frontend:
    runs-on: ubuntu-latest
    name: Frontend Build & Test

    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --max-warnings=0
        continue-on-error: false

      - name: Run Prettier Check
        run: npx prettier --check .
        continue-on-error: true

      - name: Build
        working-directory: ./client
        run: npm run build
        env:
          CI: true
          GENERATE_SOURCEMAP: false

      - name: Run Tests
        working-directory: ./client
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true
          REACT_APP_APPWRITE_ENDPOINT: ${{ secrets.REACT_APP_APPWRITE_ENDPOINT }}
          REACT_APP_APPWRITE_PROJECT_ID: ${{ secrets.REACT_APP_APPWRITE_PROJECT_ID }}
          REACT_APP_APPWRITE_DATABASE_ID: ${{ secrets.REACT_APP_APPWRITE_DATABASE_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: frontend-build
          path: client/build/
          retention-days: 7

  backend:
    runs-on: ubuntu-latest
    name: Backend Build & Test

    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --max-warnings=0
        continue-on-error: true

      - name: Run Prettier Check
        run: npx prettier --check .
        continue-on-error: true

      - name: Run Tests
        run: npm test -- --passWithNoTests
        env:
          CI: true

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    needs: [frontend, backend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./client

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./server

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: ./client
        continue-on-error: true

      - name: Audit backend dependencies
        run: npm audit --audit-level=high
        working-directory: ./server
        continue-on-error: true

  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: [frontend, backend, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Production deployment placeholder."
          echo "Implement deployment logic here when infrastructure is ready."
