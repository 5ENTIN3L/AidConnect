name: CI/CD Pipeline

on:
  push:
    branches: ['main', 'feature/*']
  pull_request:
    branches: ['main']

env:
  NODE_VERSION: '18.x'

jobs:
  frontend:
    runs-on: ubuntu-latest
    name: Frontend Build & Test

    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --max-warnings=0
        continue-on-error: false

      - name: Run Prettier Check
        run: npx prettier --check .
        continue-on-error: true

      - name: Build
        working-directory: ./client
        run: npm run build
        env:
          CI: true
          GENERATE_SOURCEMAP: false

      - name: Run Tests
        working-directory: ./client
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true
          REACT_APP_APPWRITE_ENDPOINT: ${{ secrets.REACT_APP_APPWRITE_ENDPOINT }}
          REACT_APP_APPWRITE_PROJECT_ID: ${{ secrets.REACT_APP_APPWRITE_PROJECT_ID }}
          REACT_APP_APPWRITE_DATABASE_ID: ${{ secrets.REACT_APP_APPWRITE_DATABASE_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: frontend-build
          path: client/build/
          retention-days: 7

  backend:
    runs-on: ubuntu-latest
    name: Backend Build & Test

    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --max-warnings=0
        continue-on-error: true

      - name: Run Prettier Check
        run: npx prettier --check .
        continue-on-error: true

      - name: Run Tests
        run: npm test -- --passWithNoTests
        env:
          CI: true

  e2e:
    runs-on: ubuntu-latest
    name: E2E Smoke Tests
    needs: [frontend]

    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npx playwright test --config=playwright.config.js
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

  e2e-auth:
    runs-on: ubuntu-latest
    name: E2E Authenticated Tests
    needs: [frontend]

    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Check auth secret availability
        id: auth_secrets
        shell: bash
        run: |
          if [[ -n "$E2E_STAFF_EMAIL" && -n "$E2E_STAFF_PASSWORD" && -n "$REACT_APP_APPWRITE_ENDPOINT" && -n "$REACT_APP_APPWRITE_PROJECT_ID" && -n "$REACT_APP_APPWRITE_DATABASE_ID" ]]; then
            echo "run_auth=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_auth=false" >> "$GITHUB_OUTPUT"
            echo "Authenticated E2E skipped: required secrets are missing."
          fi
        env:
          REACT_APP_APPWRITE_ENDPOINT: ${{ secrets.REACT_APP_APPWRITE_ENDPOINT }}
          REACT_APP_APPWRITE_PROJECT_ID: ${{ secrets.REACT_APP_APPWRITE_PROJECT_ID }}
          REACT_APP_APPWRITE_DATABASE_ID: ${{ secrets.REACT_APP_APPWRITE_DATABASE_ID }}
          E2E_STAFF_EMAIL: ${{ secrets['E2E_STAFF_EMAIL'] }}
          E2E_STAFF_PASSWORD: ${{ secrets['E2E_STAFF_PASSWORD'] }}

      - name: Run E2E authenticated tests
        if: steps.auth_secrets.outputs.run_auth == 'true'
        run: npx playwright test --config=playwright.auth.config.js
        continue-on-error: ${{ startsWith(github.ref, 'refs/heads/feature/') }}
        env:
          CI: true
          REACT_APP_APPWRITE_ENDPOINT: ${{ secrets.REACT_APP_APPWRITE_ENDPOINT }}
          REACT_APP_APPWRITE_PROJECT_ID: ${{ secrets.REACT_APP_APPWRITE_PROJECT_ID }}
          REACT_APP_APPWRITE_DATABASE_ID: ${{ secrets.REACT_APP_APPWRITE_DATABASE_ID }}
          E2E_STAFF_EMAIL: ${{ secrets['E2E_STAFF_EMAIL'] }}
          E2E_STAFF_PASSWORD: ${{ secrets['E2E_STAFF_PASSWORD'] }}

      - name: Upload authenticated Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-auth-report
          path: client/playwright-report/
          retention-days: 7

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    needs: [frontend, backend, e2e]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./client

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./server

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: ./client
        continue-on-error: true

      - name: Audit backend dependencies
        run: npm audit --audit-level=high
        working-directory: ./server
        continue-on-error: true

  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: [frontend, backend, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Production deployment placeholder."
          echo "Implement deployment logic here when infrastructure is ready."
